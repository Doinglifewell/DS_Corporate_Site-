<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeStore · QR Scan Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --royal:#321B68; --orchid:#6A14DB; --violet:#B354F1;
  --orange:#FF9F46; --green:#28B79D; --pure-green:#2FB457;
  --pink:#FF1B9A;
  --bg:#0a0a0d; --d1:#0d0d10; --d2:#141418; --d3:#1c1c22; --d4:#26262e;
  --bdr:#2e2e38; --muted:#6b6b80; --dim:#9999b0; --txt:#ffffff;
  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden}
.shell{display:grid;grid-template-rows:56px 1fr;grid-template-columns:280px 1fr;height:100vh}
.topbar{grid-column:1/-1;background:var(--d1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:200}
.sidebar{background:var(--d1);border-right:1px solid var(--bdr);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.main{position:relative;overflow:hidden}
#map{width:100%;height:100%;z-index:1}
.leaflet-container{background:#0a0a0d !important;font-family:var(--font)}
.leaflet-tile-pane{filter:brightness(0.35) saturate(0.4) hue-rotate(200deg)}
</style>
