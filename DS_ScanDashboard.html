<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --royal:#321B68; --orchid:#6A14DB; --violet:#B354F1;
  --orange:#FF9F46; --green:#28B79D; --pure-green:#2FB457;
  --pink:#FF1B9A;
  --bg:#0a0a0d; --d1:#0d0d10; --d2:#141418; --d3:#1c1c22; --d4:#26262e;
  --bdr:#2e2e38; --muted:#6b6b80; --dim:#9999b0; --txt:#ffffff;
  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
[data-theme="light"]{
  --bg:#f5f5f8;--d1:#ffffff;--d2:#ffffff;--d3:#f0f0f4;--d4:#e8e8ee;
  --border:#e0e0e8;--border2:#d0d0da;
  --text:#1a1a22;--text2:#555566;--text3:#888898;
  --green:#1a9a82;--green2:#229a48;--orange:#e08830;--red:#d44332;--blue:#2563eb;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── LAYOUT ── */
.shell{display:grid;grid-template-rows:56px 1fr;grid-template-columns:280px 1fr;height:100vh}
.topbar{grid-column:1/-1;background:var(--d1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:200}
.sidebar{background:var(--d1);border-right:1px solid var(--bdr);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.main{position:relative;overflow:hidden}

/* ── TOPBAR ── */
.logo-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--orchid),var(--violet));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.logo-text{font-size:13px;font-weight:900;letter-spacing:0.04em}
.logo-sub{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.06em;margin-left:4px}
.topbar-divider{width:1px;height:24px;background:var(--bdr);margin:0 4px}
.live-badge{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:800;color:var(--green);letter-spacing:0.06em;background:rgba(40,183,157,0.1);border:1px solid rgba(40,183,157,0.25);border-radius:100px;padding:4px 10px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(40,183,157,0.8);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}
.topbar-stats{margin-left:auto;display:flex;gap:20px}
.topbar-stat{text-align:right}
.topbar-stat-val{font-size:15px;font-weight:900;line-height:1}
.topbar-stat-label{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:0.06em;margin-top:2px}
.filter-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-pill.active{border-color:var(--violet);color:var(--violet);background:rgba(179,84,241,0.1)}
.filter-pill:hover:not(.active){border-color:var(--muted);color:var(--txt)}

/* ── SIDEBAR ── */
.section-label{font-size:8px;font-weight:900;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin:4px 0 8px}
.stat-card{background:var(--d2);border:1px solid var(--bdr);border-radius:12px;padding:12px 14px}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.stat-name{font-size:11px;color:var(--dim);font-weight:600}
.stat-val{font-size:13px;font-weight:800}
.mini-bar-wrap{height:3px;background:var(--d4);border-radius:2px;overflow:hidden;margin-top:6px}
.mini-bar{height:100%;border-radius:2px;transition:width 1s ease}

.scan-feed{display:flex;flex-direction:column;gap:6px}
.feed-item{background:var(--d2);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .15s;animation:slideIn 0.35s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
.feed-item:hover{border-color:var(--violet);background:rgba(179,84,241,0.06)}
.feed-product{font-size:11px;font-weight:800;color:var(--txt);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-meta{font-size:9px;color:var(--muted);display:flex;gap:6px;align-items:center}
.feed-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.feed-time{margin-left:auto;font-family:var(--mono);font-size:8px;color:var(--muted)}

.chain-badge{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:800;letter-spacing:0.06em;border-radius:4px;padding:2px 6px}

/* ── MAP ── */
#map{width:100%;height:100%;z-index:1}
.leaflet-container{background:var(--bg) !important;font-family:var(--font)}
.leaflet-tile-pane{filter:brightness(0.68) saturate(0.45) hue-rotate(200deg)}

/* ── SCAN POPUP ── */
.scan-popup{
  position:absolute;z-index:400;pointer-events:none;
  background:var(--d2);border:1px solid var(--violet);
  border-radius:14px;padding:12px 14px;min-width:200px;
  box-shadow:0 0 30px rgba(179,84,241,0.3);
  animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(0.7) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.popup-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.popup-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.popup-product{font-size:12px;font-weight:800;color:var(--txt)}
.popup-brand{font-size:10px;color:var(--violet);font-weight:700}
.popup-rows{display:flex;flex-direction:column;gap:4px}
.popup-row{display:flex;justify-content:space-between;font-size:10px}
.popup-key{color:var(--muted);font-weight:600}
.popup-val{color:var(--txt);font-weight:700;font-family:var(--mono)}
.popup-gtin{font-size:8px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--bdr);font-family:var(--mono)}

/* ── MAP MARKERS ── */
.scan-marker{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;
  border:2px solid rgba(106, 20, 219, 0.15);
  box-shadow:0 0 16px currentColor;
  animation:markerPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  transition:transform .15s;
}
@keyframes markerPop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
.scan-marker:hover{transform:scale(1.2)}

/* ── LEGEND ── */
.legend{position:absolute;bottom:20px;left:300px;z-index:500;background:rgba(13,13,16,0.9);border:1px solid var(--bdr);border-radius:12px;padding:12px 16px;backdrop-filter:blur(12px)}
.legend-title{font-size:9px;font-weight:900;letter-spacing:0.1em;color:var(--muted);margin-bottom:8px}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:10px;color:var(--dim);font-weight:600}
.legend-swatch{width:10px;height:10px;border-radius:50%}

/* ── HEATMAP TOGGLE ── */
.map-controls{position:absolute;top:12px;right:12px;z-index:500;display:flex;gap:8px}
.map-btn{background:rgba(13,13,16,0.9);border:1px solid var(--bdr);border-radius:8px;padding:7px 12px;font-size:10px;font-weight:800;color:var(--dim);font-family:var(--font);cursor:pointer;transition:all .15s;backdrop-filter:blur(8px);letter-spacing:0.04em}
.map-btn.active,.map-btn:hover{border-color:var(--violet);color:var(--violet);background:rgba(179,84,241,0.1)}

/* ── COUNTER ANIMATE ── */
@keyframes countUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.count-anim{animation:countUp 0.4s ease}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
</style>
</head>

  {name:'London',lat:51.51,lng:-0.13},{name:'Paris',lat:48.86,lng:2.35},
  {name:'Amsterdam',lat:52.37,lng:4.9},{name:'Berlin',lat:52.52,lng:13.4},
  {name:'New York',lat:40.71,lng:-74.01},{name:'Los Angeles',lat:34.05,lng:-118.24},
  {name:'San Francisco',lat:37.77,lng:-122.41},{name:'Toronto',lat:43.65,lng:-79.38},
  {name:'Tokyo',lat:35.69,lng:139.69},{name:'Singapore',lat:1.35,lng:103.82},
  {name:'Hong Kong',lat:22.32,lng:114.17},{name:'Seoul',lat:37.57,lng:126.98},
  {name:'Dubai',lat:25.2,lng:55.27},{name:'Cape Town',lat:-33.93,lng:18.42},
];

// ── STATE ──
let totalScans = 2847;
let todayScans = 143;
let activeFilter = 'all';
let scanHistory = [];
let markerLayer, heatLayer;
let currentLayer = 'heat';
let activeMarkers = [];

// ── MAP INIT ──
const map = L.map('map', {
  center: [20, 15],
  zoom: 2,
  zoomControl: false,
  attributionControl: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  attribution: '© CartoDB'
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// Heatmap
const heatData = HOTSPOTS.map(h => [h[0], h[1], h[2]]);
heatLayer = L.heatLayer(heatData, {
  radius: 35, blur: 25, maxZoom: 10,
  gradient: { 0.1:'#321B68', 0.3:'#6A14DB', 0.5:'#B354F1', 0.75:'#FF9F46', 1.0:'#ffffff' }
}).addTo(map);

markerLayer = L.layerGroup();

// ── SIDEBAR RENDER ──
function renderTopProducts() {
  const counts = {};
  PRODUCTS.forEach((p,i) => counts[i] = Math.floor(Math.random() * 800 + 100));
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const max = sorted[0][1];
  document.getElementById('topProducts').innerHTML = sorted.map(([i,c]) => {
    const p = PRODUCTS[i];
    return `<div style="margin-bottom:10px">
      <div class="stat-row"><span class="stat-name">${p.icon} ${p.name}</span><span class="stat-val" style="color:${p.col}">${c.toLocaleString()}</span></div>
      <div style="font-size:9px;color:var(--muted);margin-bottom:4px">${p.brand}</div>
      <div class="mini-bar-wrap"><div class="mini-bar" style="width:${(c/max*100).toFixed(0)}%;background:${p.col}"></div></div>
    </div>`;
  }).join('');
}

function renderScanTypes() {
  document.getElementById('scanTypes').innerHTML = SCAN_TYPES.map(s => `
    <div style="margin-bottom:10px">
      <div class="stat-row"><span class="stat-name">${s.type}</span><span class="stat-val" style="color:${s.col}">${s.pct}%</span></div>
      <div class="mini-bar-wrap"><div class="mini-bar" style="width:${s.pct}%;background:${s.col}"></div></div>
    </div>
  `).join('');
}

function renderChains() {
  document.getElementById('chainDist').innerHTML = CHAINS.map(c => `
    <div style="margin-bottom:10px">
      <div class="stat-row">
        <span class="stat-name">◇ ${c.name}</span>
        <span class="stat-val" style="color:${c.col}">${c.pct}%</span>
      </div>
      <div class="mini-bar-wrap"><div class="mini-bar" style="width:${c.pct}%;background:${c.col}"></div></div>
    </div>
  `).join('');
}

// ── COUNTER UPDATE ──
function animateCounter(el, target) {
  const start = parseInt(el.textContent.replace(/,/g,''))||0;
  const duration = 600;
  const startTime = performance.now();
  function update(now) {
    const t = Math.min((now-startTime)/duration,1);
    const val = Math.round(start + (target-start)*t);
    el.textContent = val.toLocaleString();
    if(t<1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

function updateCounters() {
  animateCounter(document.getElementById('totalScans'), totalScans);
  animateCounter(document.getElementById('todayScans'), todayScans);
  animateCounter(document.getElementById('uniqueProducts'), PRODUCTS.length);
  animateCounter(document.getElementById('countryCount'), 28);
}

// ── SCAN POPUP ON MAP ──
function showMapPopup(lat, lng, product) {
  // Get position relative to the map container (not the page)
  const mapEl = document.getElementById('map');
  const point = map.latLngToContainerPoint([lat, lng]);
  const POPUP_W = 220, POPUP_H = 160, MARGIN = 12;

  const popup = document.createElement('div');
  popup.className = 'scan-popup';

  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const city = CITIES[Math.floor(Math.random()*CITIES.length)];

  popup.innerHTML = `
    <div class="popup-header">
      <div class="popup-icon" style="background:${product.col}20;border:1px solid ${product.col}40">${product.icon}</div>
      <div>
        <div class="popup-product">${product.name}</div>
        <div class="popup-brand">${product.brand}</div>
      </div>
    </div>
    <div class="popup-rows">
      <div class="popup-row"><span class="popup-key">Location</span><span class="popup-val">${city.name}</span></div>
      <div class="popup-row"><span class="popup-key">Category</span><span class="popup-val">${product.category}</span></div>
      <div class="popup-row"><span class="popup-key">Chain</span><span class="popup-val">${product.chain}</span></div>
      <div class="popup-row"><span class="popup-key">Time</span><span class="popup-val">${timeStr}</span></div>
    </div>
    <div class="popup-gtin">GS1 GTIN: ${product.gtin}</div>
  `;

  // Anchor popup inside #map — coordinates are already relative to the map container
  // Keep fully within map bounds with margin
  const mapW = mapEl.offsetWidth, mapH = mapEl.offsetHeight;
  let left = point.x + 16;
  let top  = point.y - 40;
  // Push left if it would overflow the right edge
  if (left + POPUP_W + MARGIN > mapW) left = point.x - POPUP_W - 16;
  // Push down if it would overflow the top
  if (top < MARGIN) top = point.y + 16;
  // Push up if it would overflow the bottom
  if (top + POPUP_H + MARGIN > mapH) top = mapH - POPUP_H - MARGIN;
  // Hard-clamp to keep inside map
  left = Math.max(MARGIN, Math.min(left, mapW - POPUP_W - MARGIN));
  top  = Math.max(MARGIN, Math.min(top,  mapH - POPUP_H - MARGIN));

  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';
  // Append to map container, not body — popup stays inside the map area
  mapEl.appendChild(popup);

  setTimeout(() => {
    popup.style.transition = 'opacity 0.4s ease';
    popup.style.opacity = '0';
    setTimeout(() => popup.remove(), 400);
  }, 2800);
}

// ── ANIMATED MARKER ──
function addMarker(lat, lng, product) {
  if(activeFilter !== 'all' && product.category !== activeFilter) return;

  const icon = L.divIcon({
    className:'',
    html:`<div class="scan-marker" style="background:${product.col}22;color:${product.col};border-color:${product.col}60;box-shadow:0 0 16px ${product.col}80">${product.icon}</div>`,
    iconSize:[32,32],
    iconAnchor:[16,16],
  });

  const marker = L.marker([lat,lng],{icon}).addTo(markerLayer);
  activeMarkers.push({marker, addedAt: Date.now()});

  // Remove marker after 8s
  setTimeout(() => {
    try { markerLayer.removeLayer(marker); } catch(e){}
  }, 8000);
}

// ── FEED ITEM ──
function addFeedItem(product, city) {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const feed = document.getElementById('scanFeed');

  const item = document.createElement('div');
  item.className = 'feed-item';
  item.innerHTML = `
    <div class="feed-product">${product.icon} ${product.name}</div>
    <div class="feed-meta">
      <span class="feed-dot" style="background:${product.col}"></span>
      ${city.name}
      <span style="color:var(--dim)">·</span>
      ${product.brand}
      <span class="feed-time">${timeStr}</span>
    </div>
  `;
  item.onclick = () => map.flyTo([city.lat, city.lng], 6, {duration:1.2});
  feed.insertBefore(item, feed.firstChild);

  // Keep max 12 items
  while(feed.children.length > 12) feed.removeChild(feed.lastChild);
}

// ── SIMULATE LIVE SCAN ──
function simulateScan() {
  const hotspot = HOTSPOTS[Math.floor(Math.random()*HOTSPOTS.length)];
  const product = PRODUCTS[hotspot[3]];
  if(activeFilter !== 'all' && product.category !== activeFilter) return;

  const lat = hotspot[0] + (Math.random()-0.5)*3;
  const lng = hotspot[1] + (Math.random()-0.5)*3;
  const city = CITIES[Math.floor(Math.random()*CITIES.length)];

  totalScans++;
  todayScans++;
  updateCounters();

  addMarker(lat, lng, product);
  addFeedItem(product, city);

  // Show popup on map
  if(currentLayer !== 'heat') {
    showMapPopup(lat, lng, product);
  } else {
    // Still show popup in heat mode sometimes
    if(Math.random() > 0.4) showMapPopup(lat, lng, product);
  }
}

// ── LAYER TOGGLE ──
function toggleLayer(mode, btn) {
  currentLayer = mode;
  document.querySelectorAll('.map-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  if(mode==='heat') { map.addLayer(heatLayer); map.removeLayer(markerLayer); }
  else if(mode==='markers') { map.removeLayer(heatLayer); map.addLayer(markerLayer); }
  else { map.addLayer(heatLayer); map.addLayer(markerLayer); }
}

// ── FILTER ──
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ── INIT ──
renderTopProducts();
renderScanTypes();
renderChains();
updateCounters();

// Start live simulation
function scheduleNext() {
  const delay = 800 + Math.random() * 2400;
  setTimeout(() => {
    simulateScan();
    scheduleNext();
  }, delay);
}
scheduleNext();

// Burst a few initial scans
setTimeout(()=>simulateScan(),200);
setTimeout(()=>simulateScan(),600);
setTimeout(()=>simulateScan(),1100);
</script>
